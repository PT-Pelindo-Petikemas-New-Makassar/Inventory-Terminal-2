<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PELINDO INVENTORY - TERMINAL 2</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#004a99">
    <link rel="manifest" href="manifest.json">

    <!-- Framework & Library -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        :root { --pelindo-blue-dark: #004a99; --pelindo-blue-light: #00aeef; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; text-transform: uppercase; overscroll-behavior-y: contain; }
        .pelindo-gradient { background: linear-gradient(135deg, var(--pelindo-blue-dark) 0%, #003366 100%); }
        .form-input { @apply mt-1 block w-full rounded-2xl border-gray-200 shadow-sm focus:border-[#00aeef] focus:ring-[#00aeef] text-sm p-3 border transition-all uppercase font-bold; }
        .btn-circle { @apply w-14 h-14 rounded-full flex items-center justify-center text-white shadow-lg transition-all duration-300 active:scale-90 hover:-translate-y-1; }
        .card-pelindo { @apply bg-white rounded-[2.5rem] shadow-xl shadow-slate-200/50 border border-slate-100 overflow-hidden; }
        .status-badge { @apply px-3 py-1 rounded-full text-[9px] font-black border uppercase tracking-wider; }
        .loading-overlay { @apply fixed inset-0 bg-white z-[300] flex flex-col items-center justify-center transition-opacity duration-500; }
        .color-excel { @apply bg-emerald-600 ring-4 ring-emerald-50; }
        .color-word { @apply bg-blue-600 ring-4 ring-blue-50; }
        .color-pdf { @apply bg-red-600 ring-4 ring-red-50; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, deleteDoc, updateDoc, doc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Konfigurasi Database Real-Time Pelindo T2
        const firebaseConfig = {
            apiKey: "AIzaSyAIwAX6CaRy-PLa_KUhMyl_b5CnNia1DxM",
            authDomain: "inventaris-pelindo-t2.firebaseapp.com",
            projectId: "inventaris-pelindo-t2",
            storageBucket: "inventaris-pelindo-t2.firebasestorage.app",
            messagingSenderId: "92778704858",
            appId: "1:92778704858:web:8664db80ccd46ad0d31ae3",
            measurementId: "G-CXMESTJTXD"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        window.pelindoSync = { db, auth, collection, addDoc, deleteDoc, updateDoc, doc, onSnapshot, query, orderBy, signInAnonymously };
    </script>
</head>
<body class="min-h-screen text-slate-800 pb-20 text-left">

    <!-- Loading Screen -->
    <div id="loader" class="loading-overlay">
        <div class="w-12 h-12 border-4 border-[#00aeef] border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="font-black text-[10px] tracking-widest text-[#004a99]">MENGHUBUNGKAN CLOUD PELINDO...</p>
    </div>

    <!-- Navigation -->
    <nav class="pelindo-gradient text-white shadow-2xl sticky top-0 z-[100]">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-4 text-left">
                <div class="bg-white p-1 rounded-xl shadow-inner flex items-center w-10 h-10 overflow-hidden text-[#004a99]">
                    <i data-lucide="anchor" class="mx-auto"></i>
                </div>
                <div>
                    <h1 class="text-base font-extrabold tracking-wider leading-tight">PT PELINDO PETIKEMAS NEW MAKASSAR</h1>
                    <p class="text-[8px] opacity-70 font-black tracking-widest uppercase">TEKNIK TERMINAL 2</p>
                </div>
            </div>
            <div class="flex items-center gap-2 bg-white/10 px-3 py-1 rounded-full border border-white/20">
                <div id="syncDot" class="w-1.5 h-1.5 bg-slate-400 rounded-full"></div>
                <span id="syncText" class="text-[8px] font-black uppercase">MENGHUBUNGKAN...</span>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-8">
        <!-- Header Dashboard -->
        <div class="mb-12">
            <h2 class="text-2xl font-black text-slate-900 tracking-tight uppercase">MANAJEMEN INVENTARIS</h2>
            <div class="h-1.5 w-20 bg-[#00aeef] mt-1 rounded-full mb-10"></div>
            
            <div class="flex flex-col lg:flex-row gap-8 items-end justify-between">
                <!-- Box Impor Data -->
                <div class="w-full lg:max-w-md bg-white p-5 rounded-[2.5rem] border border-dashed border-slate-200 flex items-center justify-between shadow-sm">
                    <div class="flex items-center gap-3">
                        <div class="bg-green-50 p-3 rounded-2xl text-green-600"><i data-lucide="file-up" class="w-5 h-5"></i></div>
                        <div><h4 class="text-[9px] font-black text-slate-400 uppercase mb-1">IMPOR DATA</h4><p class="text-[8px] font-bold text-slate-400 normal-case leading-tight italic">Excel (.xlsx)</p></div>
                    </div>
                    <label class="cursor-pointer bg-slate-100 hover:bg-slate-200 text-slate-600 px-6 py-3 rounded-full text-[9px] font-black uppercase transition-all border border-slate-200 active:scale-95 shadow-sm">
                        PILIH FILE
                        <input type="file" id="excelInput" accept=".xlsx, .xls" class="hidden" onchange="importFromExcel(event)">
                    </label>
                </div>

                <!-- Box Laporan (Tombol Bulat) -->
                <div class="bg-white/50 p-6 rounded-[2.5rem] border border-slate-100 shadow-sm flex flex-col items-center gap-5">
                    <h4 class="text-[10px] font-black text-[#004a99] uppercase tracking-[0.2em] leading-none">UNDUH LAPORAN</h4>
                    <div class="flex gap-8 px-4">
                        <div class="flex flex-col items-center gap-2"><button onclick="exportToExcel()" class="btn-circle color-excel"><i data-lucide="sheet"></i></button><span class="text-[8px] font-black text-slate-400 uppercase">EXCEL</span></div>
                        <div class="flex flex-col items-center gap-2"><button onclick="exportToWord()" class="btn-circle color-word"><i data-lucide="file-text"></i></button><span class="text-[8px] font-black text-slate-400 uppercase">WORD</span></div>
                        <div class="flex flex-col items-center gap-2"><button onclick="exportToPDF()" class="btn-circle color-pdf"><i data-lucide="file-type-2"></i></button><span class="text-[8px] font-black text-slate-400 uppercase">PDF</span></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Summary Bar -->
        <div id="stockSummary" class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-10 font-bold"></div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Form Input -->
            <div class="lg:col-span-4 text-left">
                <div class="card-pelindo">
                    <div class="bg-slate-50 px-6 py-5 border-b flex items-center gap-2">
                        <i data-lucide="plus-circle" class="w-4 h-4 text-[#004a99]"></i>
                        <h3 class="font-black text-slate-800 text-[10px] uppercase tracking-widest">INPUT BARANG</h3>
                    </div>
                    <form id="inventoryForm" class="p-6 space-y-5">
                        <div>
                            <label class="block text-[9px] font-black text-slate-400 mb-1 uppercase tracking-widest">KATEGORI</label>
                            <select id="itemCategory" required class="form-input bg-white font-bold">
                                <option value="ELECTRICAL">ELECTRICAL</option>
                                <option value="PLUMBING">PLUMBING</option>
                                <option value="MECHANICAL">MECHANICAL</option>
                            </select>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div><label class="block text-[9px] font-black text-slate-400 mb-1 uppercase tracking-widest">NAMA BARANG</label><input type="text" id="itemName" required class="form-input" placeholder="..."></div>
                            <div><label class="block text-[9px] font-black text-slate-400 mb-1 uppercase tracking-widest">TIPE (OPT)</label><input type="text" id="itemType" class="form-input" placeholder="..."></div>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div><label class="block text-[9px] font-black text-slate-400 mb-1 uppercase tracking-widest">JUMLAH</label><input type="number" id="itemQty" required min="1" class="form-input" placeholder="0"></div>
                            <div><label class="block text-[9px] font-black text-slate-400 mb-1 uppercase tracking-widest">SATUAN</label><select id="itemUnit" class="form-input bg-white font-bold text-xs"><option value="PCS">PCS</option><option value="ROL">ROL</option><option value="MTR">MTR</option><option value="DOS">DOS</option><option value="UNT">UNT</option></select></div>
                        </div>
                        <select id="itemStatus" onchange="handleStatusChange()" class="form-input bg-slate-50 text-[#004a99]"><option value="MASUK">BARANG MASUK</option><option value="KELUAR">BARANG KELUAR</option></select>
                        <div id="outOptions" class="hidden p-4 bg-blue-50/50 rounded-[2rem] border border-blue-100 border-dashed space-y-4">
                            <div class="grid grid-cols-2 gap-2">
                                <label class="cursor-pointer"><input type="radio" name="subStatus" value="DIPINJAM" onchange="handleSubStatusChange()" checked class="peer hidden"><div class="text-center py-2 bg-white rounded-full border border-transparent peer-checked:border-[#00aeef] peer-checked:text-[#00aeef] font-black text-[9px] shadow-sm uppercase">PINJAM</div></label>
                                <label class="cursor-pointer"><input type="radio" name="subStatus" value="INSTALASI" onchange="handleSubStatusChange()" class="peer hidden"><div class="text-center py-2 bg-white rounded-full border border-transparent peer-checked:border-[#00aeef] peer-checked:text-[#00aeef] font-black text-[9px] shadow-sm uppercase">INSTAL</div></label>
                            </div>
                            <div id="borrowFields" class="space-y-3"><input type="text" id="borrowerName" class="form-input" placeholder="PEMINJAM"><input type="date" id="borrowDate" class="form-input"></div>
                            <div id="installFields" class="hidden space-y-3"><input type="text" id="installTech" class="form-input" placeholder="PELAKSANA"><input type="text" id="installLoc" class="form-input" placeholder="LOKASI"></div>
                            <textarea id="extraNote" class="form-input" placeholder="CATATAN TAMBAHAN..."></textarea>
                        </div>
                        <button type="submit" id="submitBtn" class="w-full bg-[#004a99] text-white py-4 rounded-full font-black text-[10px] uppercase shadow-lg active:scale-95 transition-all tracking-widest">SIMPAN DATA</button>
                    </form>
                </div>
            </div>

            <!-- Tabel Riwayat -->
            <div class="lg:col-span-8">
                <div class="card-pelindo">
                    <div class="px-6 py-5 border-b flex justify-between items-center bg-white sticky top-0 z-10"><h3 class="font-black text-[10px] uppercase tracking-widest">RIWAYAT AKTIVITAS</h3><span id="counter" class="text-[9px] bg-[#004a99] text-white px-3 py-1.5 rounded-full font-black uppercase">0 ENTRI</span></div>
                    <div class="overflow-x-auto"><table class="w-full text-left border-collapse"><tbody id="inventoryList" class="text-[10px] divide-y divide-slate-100 font-bold uppercase tracking-tight"></tbody></table></div>
                    <div id="emptyState" class="hidden py-20 text-center"><p class="text-slate-300 font-black text-[10px] uppercase">Database Kosong</p></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Kembali -->
    <div id="returnModal" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[200] flex items-end sm:items-center justify-center p-4">
        <div class="bg-white rounded-t-[2.5rem] sm:rounded-[2.5rem] p-8 max-w-sm w-full shadow-2xl uppercase text-center">
            <h3 class="text-lg font-black mb-2 text-[#004a99]">KONFIRMASI KEMBALI</h3>
            <input type="date" id="actualReturnDate" class="form-input mb-8">
            <div class="flex gap-2"><button onclick="closeModal()" class="flex-1 py-4 bg-slate-100 rounded-full font-bold text-[9px]">BATAL</button><button onclick="saveReturn()" class="flex-1 py-4 bg-[#004a99] text-white rounded-full text-[9px]">SIMPAN</button></div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 transform translate-y-32 opacity-0 transition-all duration-500 bg-[#004a99] text-white px-12 py-5 rounded-full shadow-2xl z-[200] border border-white/20 font-black text-[10px] uppercase italic text-center">OPERASI BERHASIL</div>

    <script>
        let dbList = [];
        let curId = null;
        let isSyncActive = false;

        const init = async () => {
            const { auth, db, collection, onSnapshot, query, orderBy, signInAnonymously } = window.pelindoSync;
            try {
                await signInAnonymously(auth);
                const q = query(collection(db, "pelindo_inventory"), orderBy("createdAt", "desc"));
                onSnapshot(q, (snap) => {
                    dbList = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    isSyncActive = true;
                    updateSyncUI(true);
                    renderUI();
                    document.getElementById('loader').classList.add('hidden');
                }, (err) => {
                    console.error(err);
                    document.getElementById('loader').classList.add('hidden');
                });
            } catch(e) {
                console.error(e);
                document.getElementById('loader').classList.add('hidden');
            }
        };

        function updateSyncUI(online) {
            const dot = document.getElementById('syncDot');
            const txt = document.getElementById('syncText');
            if (online) {
                dot.classList.replace('bg-slate-400', 'bg-green-400');
                dot.classList.add('animate-pulse');
                txt.innerText = "SINKRON OTOMATIS";
            }
        }

        function handleStatusChange() { document.getElementById('outOptions').classList.toggle('hidden', document.getElementById('itemStatus').value !== 'KELUAR'); }
        function handleSubStatusChange() {
            const sub = document.querySelector('input[name="subStatus"]:checked').value;
            document.getElementById('borrowFields').classList.toggle('hidden', sub !== 'DIPINJAM');
            document.getElementById('installFields').classList.toggle('hidden', sub !== 'INSTALASI');
        }

        document.getElementById('inventoryForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const { db, collection, addDoc } = window.pelindoSync;
            const status = document.getElementById('itemStatus').value;
            const sub = status === 'KELUAR' ? document.querySelector('input[name="subStatus"]:checked').value : null;
            let detail = "-";
            if(sub === 'DIPINJAM') detail = `PEMINJAM: ${document.getElementById('borrowerName').value.toUpperCase() || 'STAF'} | TGL: ${document.getElementById('borrowDate').value}`;
            else if(sub === 'INSTALASI') detail = `PELAKSANA: ${document.getElementById('installTech').value.toUpperCase()} | LOKASI: ${document.getElementById('installLoc').value.toUpperCase()}`;
            const ext = document.getElementById('extraNote').value;
            if(ext) detail += ` | CAT: ${ext}`;

            if (!isSyncActive) return alert("Belum terhubung ke Cloud.");

            await addDoc(collection(db, "pelindo_inventory"), {
                name: document.getElementById('itemName').value.toUpperCase(),
                cat: document.getElementById('itemCategory').value,
                type: document.getElementById('itemType').value.toUpperCase() || "-",
                qty: parseInt(document.getElementById('itemQty').value),
                unit: document.getElementById('itemUnit').value,
                statusText: status === 'MASUK' ? 'MASUK' : `KELUAR (${sub})`,
                mainStatus: status, subType: sub, detail, returnDate: null,
                createdAt: Date.now(),
                timestamp: new Date().toLocaleString('id-ID', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'}).toUpperCase()
            });
            e.target.reset(); handleStatusChange(); showToast("DATA TERSINKRON");
        });

        async function importFromExcel(event) {
            const file = event.target.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = async function(e) {
                const workbook = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
                const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                for(let row of jsonData) {
                    const name = (row['NAMA BARANG'] || row['BARANG'] || '').toString().toUpperCase();
                    if(!name) continue;
                    await window.pelindoSync.addDoc(window.pelindoSync.collection(window.pelindoSync.db, "pelindo_inventory"), {
                        name, cat: (row['KATEGORI'] || 'ELECTRICAL').toUpperCase(),
                        type: (row['TIPE'] || '-').toUpperCase(), qty: parseInt(row['JUMLAH'] || 0), unit: (row['SATUAN'] || 'PCS').toUpperCase(),
                        statusText: 'MASUK (IMPOR)', mainStatus: 'MASUK', detail: "IMPOR DATA", 
                        createdAt: Date.now(), timestamp: new Date().toLocaleString('id-ID').toUpperCase()
                    });
                }
                showToast("DATA DIIMPOR");
                event.target.value = '';
            };
            reader.readAsArrayBuffer(file);
        }

        async function deleteItem(id) { if(confirm('HAPUS DATA INI DARI CLOUD?')) await window.pelindoSync.deleteDoc(window.pelindoSync.doc(window.pelindoSync.db, "pelindo_inventory", id)); }
        function openModal(id) { curId = id; document.getElementById('returnModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('returnModal').classList.add('hidden'); }
        async function saveReturn() {
            const date = document.getElementById('actualReturnDate').value; if(!date) return;
            const item = dbList.find(x => x.id === curId);
            await window.pelindoSync.updateDoc(window.pelindoSync.doc(window.pelindoSync.db, "pelindo_inventory", curId), {
                returnDate: date, detail: item.detail + ` | KEMBALI: ${date}`, statusText: 'KELUAR (KEMBALI)'
            });
            closeModal(); showToast("STATUS DIPERBARUI");
        }

        function renderUI() {
            const list = document.getElementById('inventoryList'); list.innerHTML = '';
            document.getElementById('emptyState').classList.toggle('hidden', dbList.length > 0);
            dbList.forEach(i => {
                let badge = i.mainStatus === 'MASUK' ? 'bg-green-50 text-green-700' : 'bg-slate-50 text-slate-500';
                if(i.subType === 'DIPINJAM') badge = 'bg-blue-50 text-blue-600';
                if(i.subType === 'INSTALASI') badge = 'bg-orange-50 text-orange-600';
                list.innerHTML += `<tr>
                    <td class="px-6 py-5"><b>${i.timestamp}</b><br><span class="text-[#00aeef] text-[8px] tracking-widest">${i.cat}</span></td>
                    <td class="px-6 py-4"><b>${i.name}</b><br><span class="text-[8px] text-slate-300 font-bold">${i.type}</span><br><span class="text-xs text-slate-600">${i.qty} ${i.unit}</span><br><span class="status-badge ${badge} mt-1 inline-block">${i.statusText}</span><br>
                        <div class="text-[9px] text-slate-400 lowercase mt-2 italic font-bold leading-tight">${i.detail}</div>
                        ${i.subType === 'DIPINJAM' && !i.returnDate ? `<button onclick="openModal('${i.id}')" class="text-[8px] text-[#00aeef] border border-blue-100 px-3 py-1 rounded-full mt-2 uppercase transition-all shadow-sm">Tandai Kembali</button>` : ''}
                    </td>
                    <td class="px-6 py-4 text-right align-top"><button onclick="deleteItem('${i.id}')" class="text-slate-200 mt-1 hover:text-red-500 transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button></td>
                </tr>`;
            });
            updateStats(); document.getElementById('counter').innerText = `${dbList.length} ENTRI`; lucide.createIcons();
        }

        function updateStats() {
            const s = {}; dbList.forEach(i => {
                if(!s[i.name]) s[i.name] = { in: 0, out: 0, unit: i.unit, cat: i.cat };
                if(i.mainStatus === 'MASUK') s[i.name].in += i.qty; else s[i.name].out += i.qty;
            });
            const cont = document.getElementById('stockSummary'); cont.innerHTML = '';
            Object.keys(s).slice(0, 4).forEach(k => {
                const bal = s[k].in - s[k].out;
                cont.innerHTML += `<div class="bg-white p-4 rounded-[2.5rem] border border-slate-100 flex flex-col justify-between shadow-sm min-h-[90px]">
                    <span class="text-[7px] text-slate-300 font-black tracking-widest uppercase truncate">${s[k].cat}</span>
                    <div><div class="text-[10px] font-black truncate uppercase">${k}</div><div class="text-lg font-black text-[#004a99] mt-1">${bal} <small class="text-[8px] font-bold text-slate-400 uppercase">${s[k].unit}</small></div></div>
                </div>`;
            });
        }

        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.classList.replace('translate-y-32', 'translate-y-0'); t.classList.replace('opacity-0', 'opacity-100'); setTimeout(() => { t.classList.replace('translate-y-0', 'translate-y-32'); t.classList.replace('opacity-100', 'opacity-0'); }, 3000); }

        function exportToExcel() { const ws = XLSX.utils.json_to_sheet(dbList.map(i => ({ 'WAKTU': i.timestamp, 'KATEGORI': i.cat, 'BARANG': i.name, 'QTY': i.qty, 'SATUAN': i.unit, 'STATUS': i.statusText, 'DETAIL': i.detail }))); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Stok"); XLSX.writeFile(wb, `PELINDO_REPORT.xlsx`); }
        async function exportToPDF() { const { jsPDF } = window.jspdf; const doc = new jsPDF('l', 'mm', 'a4'); doc.text("LAPORAN INVENTARIS", 14, 15); doc.autoTable({ head: [['WAKTU', 'KAT', 'BARANG', 'QTY', 'STATUS', 'DETAIL']], body: dbList.map(i => [i.timestamp, i.cat, i.name, `${i.qty} ${i.unit}`, i.statusText, i.detail]), startY: 25 }); doc.save("PELINDO_REPORT.pdf"); }
        async function exportToWord() { 
            const { Document, Packer, Paragraph, Table, TableRow, TableCell, WidthType } = docx; 
            const rows = [new TableRow({ children: ["WAKTU", "BARANG", "QTY", "STATUS"].map(t => new TableCell({ children: [new Paragraph({ text: t, bold: true })] })) })]; 
            dbList.forEach(i => rows.push(new TableRow({ children: [i.timestamp, i.name, i.qty.toString(), i.statusText].map(t => new TableCell({ children: [new Paragraph(t)] })) }))); 
            const docX = new Document({ sections: [{ children: [new Paragraph({ text: "LAPORAN INVENTARIS", bold: true, size: 28 }), new Table({ width: { size: 100, type: WidthType.PERCENTAGE }, rows })] }] }); 
            saveAs(await Packer.toBlob(docX), "WORD_PELINDO.docx"); 
        }

        window.onload = init;
    </script>
</body>
</html>
