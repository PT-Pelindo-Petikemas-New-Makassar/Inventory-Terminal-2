<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PELINDO INVENTORY - TERMINAL 2</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        :root { --pelindo-blue-dark: #004a99; --pelindo-blue-light: #00aeef; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; text-transform: uppercase; }
        .pelindo-gradient { background: linear-gradient(135deg, var(--pelindo-blue-dark) 0%, #003366 100%); }
        .card-pelindo { @apply bg-white rounded-[2rem] shadow-xl border border-slate-100 overflow-hidden; }
        .form-input { @apply mt-1 block w-full rounded-xl border-gray-200 shadow-sm focus:border-[#00aeef] focus:ring-[#00aeef] text-xs p-3 border font-bold; }
        .view-section { display: none; }
        .active-view { display: block; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'pelindo-t2-inv';
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.pelindoSync = { db, auth, appId, collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy, signInAnonymously, signInWithCustomToken, getDocs };
    </script>
</head>
<body class="min-h-screen text-slate-800 pb-20">

    <!-- Navigation -->
    <nav class="pelindo-gradient text-white shadow-xl sticky top-0 z-[100]">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-4 cursor-pointer" onclick="switchView('dashboard')">
                <div class="bg-white p-1 rounded-lg w-10 h-10 flex items-center justify-center font-black text-[#004a99] text-xs italic">T2</div>
                <div>
                    <h1 class="text-sm font-extrabold tracking-widest leading-none">PELINDO</h1>
                    <p class="text-[8px] opacity-70 font-black tracking-widest mt-1">TERMINAL 2 INVENTORY</p>
                </div>
            </div>
            <div class="flex gap-4">
                <button onclick="exportToExcel()" class="bg-emerald-500 hover:bg-emerald-600 p-2 rounded-full transition-colors">
                    <i data-lucide="download" class="w-4 h-4"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div id="view-dashboard" class="view-section active-view max-w-7xl mx-auto px-4 py-8">
        <!-- Budget Stats -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="card-pelindo p-6 border-l-4 border-blue-500">
                <h4 class="text-[9px] font-black text-slate-400 tracking-widest mb-1">TOTAL ANGGARAN ELECTRICAL</h4>
                <div id="stat-elec" class="text-xl font-black text-slate-800 italic">RP 0</div>
            </div>
            <div class="card-pelindo p-6 border-l-4 border-orange-500">
                <h4 class="text-[9px] font-black text-slate-400 tracking-widest mb-1">TOTAL ANGGARAN MECHANICAL</h4>
                <div id="stat-mech" class="text-xl font-black text-slate-800 italic">RP 0</div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Form -->
            <div class="lg:col-span-4">
                <div class="card-pelindo p-6">
                    <h3 class="font-black text-[10px] mb-6 tracking-widest flex items-center gap-2 text-[#004a99]">
                        <i data-lucide="plus-square" class="w-4 h-4"></i> TAMBAH DATA INVENTARIS
                    </h3>
                    <form id="inventoryForm" class="space-y-4">
                        <div>
                            <label class="text-[9px] font-black text-slate-400 ml-1">KATEGORI</label>
                            <select id="itemCategory" class="form-input" required>
                                <option value="ELECTRICAL">ELECTRICAL</option>
                                <option value="MECHANICAL">MECHANICAL</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-[9px] font-black text-slate-400 ml-1">NAMA BARANG</label>
                            <input type="text" id="itemName" class="form-input" placeholder="CONTOH: LAMPU LED" required>
                        </div>
                        <div>
                            <label class="text-[9px] font-black text-slate-400 ml-1">TIPE / MERK</label>
                            <input type="text" id="itemType" class="form-input" placeholder="CONTOH: PHILIPS 15W">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-[9px] font-black text-slate-400 ml-1">JUMLAH (QTY)</label>
                                <input type="number" id="itemQty" class="form-input" placeholder="0" required>
                            </div>
                            <div>
                                <label class="text-[9px] font-black text-slate-400 ml-1">SATUAN</label>
                                <select id="itemUnit" class="form-input">
                                    <option value="PCS">PCS</option>
                                    <option value="SET">SET</option>
                                    <option value="ROLL">ROLL</option>
                                    <option value="PACK">PACK</option>
                                </select>
                            </div>
                        </div>
                        <div>
                            <label class="text-[9px] font-black text-slate-400 ml-1">HARGA SATUAN (RP)</label>
                            <input type="number" id="itemPrice" class="form-input" placeholder="0">
                        </div>
                        <div>
                            <label class="text-[9px] font-black text-slate-400 ml-1">STATUS</label>
                            <select id="itemStatus" class="form-input bg-blue-50">
                                <option value="MASUK">BARANG MASUK (+)</option>
                                <option value="KELUAR">BARANG KELUAR (-)</option>
                            </select>
                        </div>
                        <button type="submit" class="w-full py-4 bg-[#004a99] text-white rounded-xl font-black text-[10px] tracking-widest shadow-lg hover:scale-[1.02] transition-transform mt-4">
                            SIMPAN TRANSAKSI
                        </button>
                    </form>
                </div>
            </div>

            <!-- List -->
            <div class="lg:col-span-8">
                <div class="card-pelindo">
                    <div class="p-6 border-b flex justify-between items-center">
                        <h3 class="font-black text-[10px] tracking-widest text-[#004a99]">RIWAYAT TRANSAKSI TERBARU</h3>
                        <button onclick="openResetModal()" class="text-[8px] font-black text-red-500 bg-red-50 px-3 py-1 rounded-full hover:bg-red-100">RESET DATA</button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 text-[8px] font-black text-slate-400 uppercase tracking-widest">
                                <tr>
                                    <th class="p-4">TANGGAL</th>
                                    <th class="p-4">DETAIL BARANG</th>
                                    <th class="p-4">QTY</th>
                                    <th class="p-4">STATUS</th>
                                    <th class="p-4">AKSI</th>
                                </tr>
                            </thead>
                            <tbody id="inventoryList" class="text-[9px] font-bold divide-y divide-slate-50">
                                <!-- Data injected here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Reset Confirmation Modal -->
    <div id="resetModal" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[500] flex items-center justify-center p-6">
        <div class="bg-white rounded-[2rem] p-8 max-w-sm w-full shadow-2xl text-center">
            <h3 class="text-sm font-black text-slate-800 mb-2 uppercase">KONFIRMASI RESET</h3>
            <p class="text-[10px] text-slate-400 font-bold mb-6">KETIK "RESET" DIBAWAH INI UNTUK MENGHAPUS SEMUA DATA PERMANEN</p>
            <input type="text" id="resetConfirmInput" class="form-input text-center mb-6" placeholder="KETIK DISINI...">
            <div class="flex gap-3">
                <button onclick="closeResetModal()" class="flex-1 py-3 bg-slate-100 rounded-xl font-black text-[10px]">BATAL</button>
                <button onclick="executeReset()" class="flex-1 py-3 bg-red-600 text-white rounded-xl font-black text-[10px]">HAPUS SEMUA</button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full text-[9px] font-black tracking-widest shadow-2xl opacity-0 transition-all pointer-events-none z-[600]">
        PESAN BERHASIL
    </div>

    <script>
        let inventoryData = [];

        async function init() {
            lucide.createIcons();
            const { auth, db, appId, collection, onSnapshot, query, orderBy, signInAnonymously, signInWithCustomToken } = window.pelindoSync;
            
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'inventory_v1');
                const q = query(colRef, orderBy("createdAt", "desc"));
                
                onSnapshot(q, (snapshot) => {
                    inventoryData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    renderInventory();
                });
            } catch (err) {
                console.error("Auth Error:", err);
            }
        }

        function renderInventory() {
            const list = document.getElementById('inventoryList');
            const statElec = document.getElementById('stat-elec');
            const statMech = document.getElementById('stat-mech');
            
            list.innerHTML = '';
            let totalElec = 0;
            let totalMech = 0;

            inventoryData.forEach(item => {
                const itemTotal = (item.price || 0) * (item.qty || 0);
                if (item.category === 'ELECTRICAL') totalElec += itemTotal;
                if (item.category === 'MECHANICAL') totalMech += itemTotal;

                list.innerHTML += `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="p-4 text-slate-400 font-black">${item.timestamp || '-'}</td>
                        <td class="p-4">
                            <div class="text-[#004a99] uppercase">${item.name}</div>
                            <div class="text-[7px] text-slate-400">${item.category} | ${item.type || '-'}</div>
                        </td>
                        <td class="p-4">${item.qty} ${item.unit}</td>
                        <td class="p-4">
                            <span class="px-2 py-1 rounded-full text-[7px] font-black ${item.status === 'MASUK' ? 'bg-emerald-50 text-emerald-600' : 'bg-red-50 text-red-600'}">
                                ${item.status}
                            </span>
                        </td>
                        <td class="p-4">
                            <button onclick="deleteItem('${item.id}')" class="text-slate-200 hover:text-red-500 transition-colors">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });

            statElec.innerText = `RP ${totalElec.toLocaleString('id-ID')}`;
            statMech.innerText = `RP ${totalMech.toLocaleString('id-ID')}`;
            lucide.createIcons();
        }

        document.getElementById('inventoryForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const { db, appId, collection, addDoc } = window.pelindoSync;

            const newItem = {
                category: document.getElementById('itemCategory').value,
                name: document.getElementById('itemName').value.toUpperCase(),
                type: document.getElementById('itemType').value.toUpperCase(),
                qty: parseInt(document.getElementById('itemQty').value),
                unit: document.getElementById('itemUnit').value,
                price: parseInt(document.getElementById('itemPrice').value || 0),
                status: document.getElementById('itemStatus').value,
                createdAt: Date.now(),
                timestamp: new Date().toLocaleString('id-ID', { hour12: false, dateStyle: 'short', timeStyle: 'short' }).replace(/\//g, '-')
            };

            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'inventory_v1'), newItem);
                showToast("DATA BERHASIL DISIMPAN");
                e.target.reset();
            } catch (err) {
                showToast("GAGAL MENYIMPAN DATA", "bg-red-600");
            }
        });

        async function deleteItem(id) {
            const { db, appId, doc, deleteDoc: del } = window.pelindoSync;
            if (confirm("HAPUS BARIS INI?")) {
                await del(doc(db, 'artifacts', appId, 'public', 'data', 'inventory_v1', id));
                showToast("DATA DIHAPUS");
            }
        }

        function openResetModal() { document.getElementById('resetModal').classList.remove('hidden'); }
        function closeResetModal() { document.getElementById('resetModal').classList.add('hidden'); }

        async function executeReset() {
            const input = document.getElementById('resetConfirmInput').value;
            if (input === "RESET") {
                const { db, appId, collection, getDocs, deleteDoc: del, doc: dRef } = window.pelindoSync;
                const snapshot = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'inventory_v1'));
                const promises = snapshot.docs.map(doc => del(dRef(db, 'artifacts', appId, 'public', 'data', 'inventory_v1', doc.id)));
                await Promise.all(promises);
                closeResetModal();
                showToast("SEMUA DATA TELAH DIRESET");
            } else {
                showToast("KATA KUNCI SALAH", "bg-red-600");
            }
        }

        function exportToExcel() {
            const worksheet = XLSX.utils.json_to_sheet(inventoryData.map(i => ({
                TANGGAL: i.timestamp,
                KATEGORI: i.category,
                NAMA_BARANG: i.name,
                TIPE_MERK: i.type,
                QTY: i.qty,
                SATUAN: i.unit,
                HARGA: i.price,
                TOTAL: i.price * i.qty,
                STATUS: i.status
            })));
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Inventory");
            XLSX.writeFile(workbook, "PELINDO_T2_INVENTORY.xlsx");
        }

        function showToast(msg, color = "bg-slate-800") {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.className = `fixed bottom-8 left-1/2 -translate-x-1/2 ${color} text-white px-6 py-3 rounded-full text-[9px] font-black tracking-widest shadow-2xl transition-all z-[600] opacity-100`;
            setTimeout(() => t.classList.add('opacity-0'), 3000);
        }

        function switchView(view) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active-view'));
            document.getElementById(`view-${view}`).classList.add('active-view');
        }

        window.onload = init;
    </script>
</body>
</html>
